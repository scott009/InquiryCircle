<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InquiryCircle</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">InquiryCircle</h1>
            <p class="text-gray-600">Enter your key to join a circle</p>
        </div>
        
        <form id="keyForm" class="space-y-6">
            <div>
                <label for="key" class="block text-sm font-medium text-gray-700 mb-2">
                    Access Key
                </label>
                <input 
                    type="text" 
                    id="key" 
                    name="key" 
                    required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="Enter your key..."
                >
            </div>
            
            <button 
                type="submit" 
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition duration-200"
            >
                Enter Circle
            </button>
        </form>
        
        <div id="error" class="mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded hidden"></div>
        <div id="loading" class="mt-4 text-center text-gray-600 hidden">
            <div class="inline-block animate-spin rounded-full h-4 w-4 border-b-2 border-indigo-600"></div>
            Validating key...
        </div>
        
        <div class="mt-8 text-center text-sm text-gray-500">
            <p>Demo keys:</p>
            <p><code class="bg-gray-100 px-2 py-1 rounded">admin-master-key</code> (Admin)</p>
            <p><code class="bg-gray-100 px-2 py-1 rounded">facilitator-demo</code> (Facilitator)</p>
            <p><code class="bg-gray-100 px-2 py-1 rounded">participant-demo</code> (Participant)</p>
        </div>
    </div>

    <script>
        document.getElementById('keyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const key = document.getElementById('key').value.trim();
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            
            if (!key) {
                showError('Please enter a key');
                return;
            }
            
            // Show loading, hide error
            loadingDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/validate-key/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ key: key })
                });
                
                const data = await response.json();
                
                if (data.valid) {
                    // Redirect to appropriate page
                    window.location.href = data.redirect + '?key=' + encodeURIComponent(key);
                } else {
                    showError(data.error || 'Invalid key');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
            } finally {
                loadingDiv.classList.add('hidden');
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
